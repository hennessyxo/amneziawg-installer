{{define "dashboard"}}<!doctype html>
<html lang="{{.Lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AmneziaWG · panel</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body class="app">
  {{template "sidebar" .}}

  <div class="main-col">
    <main>
      <div class="page-head">
        <div>
          <h1>{{.L.clients}}</h1>
          <p class="hint-profile">{{.L.one_profile}}</p>
        </div>
        <button type="button" class="primary" id="add-open">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          {{.L.add_client}}
        </button>
      </div>

      <div id="created"></div>

      <div id="clients" hx-get="/partials/clients" hx-trigger="load">
        <p class="muted">…</p>
      </div>
    </main>
  </div>

  <dialog id="add-modal" class="modal">
    <form class="modal-form" hx-post="/clients" hx-target="#created" hx-swap="innerHTML">
      <div class="modal-head">
        <h2>{{.L.new_client}}</h2>
        <button type="button" class="x" data-close aria-label="{{.L.cancel}}">&times;</button>
      </div>
      <input type="hidden" name="csrf" value="{{.CSRF}}">
      <label class="field">
        <span>{{.L.f_name}}</span>
        <input type="text" name="name" placeholder="phone, laptop…"
               pattern="[A-Za-z0-9_-]{1,32}" required>
      </label>
      <p class="field-legend">{{.L.f_limits}} <i>· {{.L.optional}}</i></p>
      <div class="field-grid">
        <label class="field">
          <span>{{.L.f_days}}</span>
          <input type="number" name="expires_days" min="1" placeholder="∞">
        </label>
        <label class="field">
          <span>{{.L.f_quota}}</span>
          <input type="number" name="quota_gb" min="1" step="1" placeholder="∞">
        </label>
        <label class="field">
          <span>{{.L.f_speed}}</span>
          <input type="number" name="speed_mbit" min="1" step="1" placeholder="∞">
        </label>
      </div>
      <p class="modal-hint">{{.L.hint_limits}}</p>
      <details class="modal-adv">
        <summary>{{.L.f_advanced}} <i>· {{.L.optional}}</i></summary>
        <label class="field">
          <span class="fld-label">{{.L.f_routes}} <span class="hint" tabindex="0">?<span class="tip">{{.L.tip_routes}}</span></span></span>
          <input type="text" name="allowed_ips" placeholder="0.0.0.0/0, ::/0">
        </label>
        <div class="field-grid two">
          <label class="field">
            <span class="fld-label">{{.L.f_dns}} <span class="hint" tabindex="0">?<span class="tip">{{.L.tip_dns}}</span></span></span>
            <input type="text" name="dns" placeholder="1.1.1.1, 1.0.0.1">
          </label>
          <label class="field">
            <span class="fld-label">{{.L.f_mtu}} <span class="hint" tabindex="0">?<span class="tip">{{.L.tip_mtu}}</span></span></span>
            <input type="number" name="mtu" min="576" max="9000" placeholder="auto">
          </label>
        </div>
        <p class="modal-hint">{{.L.hint_advanced}}</p>
      </details>
      <div class="modal-actions">
        <button type="button" class="ghost" data-close>{{.L.cancel}}</button>
        <button type="submit">{{.L.add}}</button>
      </div>
    </form>
  </dialog>

  <script>
    (function () {
      var modal = document.getElementById('add-modal');
      var openBtn = document.getElementById('add-open');
      var form = modal.querySelector('form');
      function close() { modal.close(); }
      openBtn.addEventListener('click', function () {
        modal.showModal();
        var first = form.querySelector('input[name="name"]');
        if (first) first.focus();
      });
      modal.querySelectorAll('[data-close]').forEach(function (b) { b.addEventListener('click', close); });
      // click on the backdrop (outside the form) closes the dialog
      modal.addEventListener('click', function (e) { if (e.target === modal) close(); });
      // after a submit: success closes + resets, error keeps the modal open
      form.addEventListener('htmx:afterRequest', function (e) {
        if (e.detail && e.detail.successful) { form.reset(); close(); }
      });
    })();
  </script>
</body>
</html>{{end}}
