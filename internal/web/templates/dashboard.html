{{define "dashboard"}}<!doctype html>
<html lang="{{.Lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AmneziaWG · panel</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="top">
    <div class="brand">AmneziaWG <span>panel</span></div>
    <nav>
      <span class="iface">{{.Iface}}</span>
      <span class="langswitch">
        <a href="/lang/ru" class="{{if eq .Lang "ru"}}on{{end}}">RU</a>
        <a href="/lang/en" class="{{if eq .Lang "en"}}on{{end}}">EN</a>
      </span>
      <form method="post" action="/logout" class="inline">
        <button class="ghost" type="submit">{{.L.logout}}</button>
      </form>
    </nav>
  </header>

  <main>
    <section class="panel">
      <div class="panel-head">
        <h2>{{.L.clients}}</h2>
        <form class="add" hx-post="/clients" hx-target="#created" hx-swap="innerHTML">
          <input type="hidden" name="csrf" value="{{.CSRF}}">
          <input type="text" name="name" placeholder="{{.L.ph_name}}"
                 pattern="[A-Za-z0-9_-]{1,32}" required>
          <input type="number" name="expires_days" min="1" placeholder="{{.L.ph_days}}">
          <input type="number" name="quota_gb" min="1" step="1" placeholder="{{.L.ph_quota}}">
          <input type="number" name="speed_mbit" min="1" step="1" placeholder="{{.L.ph_speed}}">
          <button type="submit">{{.L.add}}</button>
        </form>
      </div>
      <p class="muted hint-profile">{{.L.one_profile}}</p>

      <div id="created"></div>

      <div id="clients" hx-get="/partials/clients" hx-trigger="load">
        <p class="muted">…</p>
      </div>
    </section>
  </main>
</body>
</html>{{end}}
