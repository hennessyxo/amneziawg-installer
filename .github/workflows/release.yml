name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  server:
    name: Server binaries (linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build static binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w" -o "awg-monitor-linux-${{ matrix.goarch }}" ./cmd/awg-monitor
          go build -ldflags "-s -w" -o "awg-panel-linux-${{ matrix.goarch }}" ./cmd/awg-panel
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            awg-monitor-linux-${{ matrix.goarch }}
            awg-panel-linux-${{ matrix.goarch }}

  deploy:
    name: Deploy tool (cross-platform)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: '' }
          - { goos: linux, goarch: arm64, ext: '' }
          - { goos: windows, goarch: amd64, ext: '.exe' }
          - { goos: darwin, goarch: amd64, ext: '' }
          - { goos: darwin, goarch: arm64, ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build & package awg-deploy
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          base="awg-deploy-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-s -w" -o "awg-deploy${{ matrix.ext }}" ./cmd/awg-deploy
          # Ship the raw binary AND an archive that preserves the executable bit
          # (so macOS/Linux users don't need `chmod +x`).
          cp "awg-deploy${{ matrix.ext }}" "${base}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${base}.zip" "awg-deploy${{ matrix.ext }}"
          else
            tar -czf "${base}.tar.gz" "awg-deploy${{ matrix.ext }}"
          fi
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: awg-deploy-${{ matrix.goos }}-${{ matrix.goarch }}*
