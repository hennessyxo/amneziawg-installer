name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Create the release once up front so the build jobs only upload assets
      # (avoids the concurrent create/list race when many matrix jobs run).
      - name: Ensure release exists
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
                 --title "${GITHUB_REF_NAME}" --notes "AmneziaWG installer ${GITHUB_REF_NAME}"

  server:
    name: Server binaries (linux)
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build static binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w" -o "awg-monitor-linux-${{ matrix.goarch }}" ./cmd/awg-monitor
          go build -ldflags "-s -w" -o "awg-panel-linux-${{ matrix.goarch }}" ./cmd/awg-panel
      - name: Upload
        run: >-
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber
          "awg-monitor-linux-${{ matrix.goarch }}" "awg-panel-linux-${{ matrix.goarch }}"

  deploy:
    name: Deploy tool (cross-platform)
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: '' }
          - { goos: linux, goarch: arm64, ext: '' }
          - { goos: windows, goarch: amd64, ext: '.exe' }
          - { goos: darwin, goarch: amd64, ext: '' }
          - { goos: darwin, goarch: arm64, ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build & package awg-deploy
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          base="awg-deploy-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-s -w" -o "awg-deploy${{ matrix.ext }}" ./cmd/awg-deploy
          # Raw binary + an archive that preserves the executable bit (no chmod).
          cp "awg-deploy${{ matrix.ext }}" "${base}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${base}.zip" "awg-deploy${{ matrix.ext }}"
          else
            tar -czf "${base}.tar.gz" "awg-deploy${{ matrix.ext }}"
          fi
      - name: Upload
        run: >-
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber
          awg-deploy-${{ matrix.goos }}-${{ matrix.goarch }}*

  gui:
    name: Desktop GUI
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, platform: darwin/universal, out: awg-gui-macos }
          - { os: windows-latest, platform: windows/amd64, out: awg-gui-windows-amd64 }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gui/go.mod
          cache-dependency-path: gui/go.sum
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean
      - name: Package & upload
        run: |
          cd build/bin
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # .app is a bundle (a directory) — zip it so the release asset is a single file.
            zip -ry "${{ matrix.out }}.zip" awg-gui.app
            gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber "${{ matrix.out }}.zip"
          else
            cp awg-gui.exe "${{ matrix.out }}.exe"
            7z a "${{ matrix.out }}.zip" "${{ matrix.out }}.exe" >/dev/null
            gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber \
              "${{ matrix.out }}.exe" "${{ matrix.out }}.zip"
          fi
