name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build & attach binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build static binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w" -o "awg-monitor-linux-${{ matrix.goarch }}" ./cmd/awg-monitor
          go build -ldflags "-s -w" -o "awg-panel-linux-${{ matrix.goarch }}" ./cmd/awg-panel
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            awg-monitor-linux-${{ matrix.goarch }}
            awg-panel-linux-${{ matrix.goarch }}
