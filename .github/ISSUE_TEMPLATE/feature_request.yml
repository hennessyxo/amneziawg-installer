name: Feature request
description: Suggest an improvement or a new capability
labels: [enhancement]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Installer (amneziawg-install.sh)
        - Web panel (awg-panel)
        - Telegram bot (awg-bot)
        - Deploy tool (awg-deploy)
        - Desktop app (GUI)
        - Terminal monitor (awg-monitor)
        - Docs
        - New / cross-cutting
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A rough idea is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have in mind.
    validations:
      required: false
